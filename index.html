<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPrep Kitchen – Kitchen Tools That Save You Time & Effort</title>
    <style>
        /* --- Modern CSS Variables --- */
        :root {
            --primary: #232f3e; /* Amazon Dark Blue */
            --accent: #febd69;  /* Amazon Orange */
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* --- Header & Search --- */
        header {
            background-color: var(--primary);
            padding: 2rem 1rem;
            text-align: center;
            color: var(--white);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-container {
            margin-top: 1.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        #searchInput {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            font-size: 1rem;
            outline: none;
            box-shadow: var(--shadow);
        }

        /* --- Product Grid --- */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        #productGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
        }

        /* --- Product Card --- */
        .product-card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .image-container {
            width: 100%;
            height: 250px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .product-card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .product-info {
            padding: 1.5rem;
            border-top: 1px solid #eee;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn {
            background-color: var(--accent);
            color: var(--primary);
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Empty State */
        #noResults {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            display: none;
        }

        /* Responsive Adjustments */
        @media (max-width: 600px) {
            #productGrid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }
            .image-container { height: 180px; }
            .product-name { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>QuickPrep Kitchen</h1>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search for products (e.g. Camera, Laptop)...">
    </div>
</header>

<div class="container">
    <div id="productGrid">
        </div>
    <div id="noResults">
        <h3>No products found. Try a different search!</h3>
    </div>
</div>

<script>
    // 1. PRODUCT DATA STRUCTURE
    // Add your Amazon Affiliate links and image URLs here
    const products = [
        {
            name: "VOLTURI Fridge Storage Containers ",
            image: "image/VOLTURI Fridge Storage Containers (Pack of 6), Fridge Organiser Storage Boxes with Lids, Stackable Organizer, Kitchen Accessories Items for Home Keep Fruits.jpg",
            link: "https://amzn.to/example1" 
        },
        {
            name: "Apple 2024 MacBook Air 13-inch Laptop with M3 chip",
            image: "https://m.media-amazon.com/images/I/71ItMhg1AnL._AC_SL1500_.jpg",
            link: "https://amzn.to/example2"
        },
        {
            name: "Logitech MX Master 3S Wireless Mouse",
            image: "https://m.media-amazon.com/images/I/61ni3t1ryQL._AC_SL1500_.jpg",
            link: "https://amzn.to/example3"
        },
        {
            name: "Kindle Paperwhite (16 GB) – 6.8 inch display",
            image: "https://m.media-amazon.com/images/I/51QCBy8nbEL._AC_SL1000_.jpg",
            link: "https://amzn.to/example4"
        },
        {
            name: "Samsung Odyssey G7 Series 32-Inch Gaming Monitor",
            image: "https://m.media-amazon.com/images/I/81v90JtbP6L._AC_SL1500_.jpg",
            link: "https://amzn.to/example5"
        }
    ];

    const productGrid = document.getElementById('productGrid');
    const searchInput = document.getElementById('searchInput');
    const noResults = document.getElementById('noResults');

    // 2. RENDER FUNCTION
    function displayProducts(filteredProducts) {
        // Clear current grid
        productGrid.innerHTML = "";

        if (filteredProducts.length === 0) {
            noResults.style.display = "block";
            return;
        }

        noResults.style.display = "none";

        // Create HTML for each product
        filteredProducts.forEach(product => {
            const productCard = `
                <a href="${product.link}" target="_blank" class="product-card">
                    <div class="image-container">
                        <img src="${product.image}" alt="${product.name}" loading="lazy">
                    </div>
                    <div class="product-info">
                        <h2 class="product-name">${product.name}</h2>
                        <div class="btn">View on Amazon</div>
                    </div>
                </a>
            `;
            productGrid.innerHTML += productCard;
        });
    }

    // 3. SEARCH LOGIC (Real-time)
    searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        
        const filtered = products.filter(product => 
            product.name.toLowerCase().includes(searchTerm)
        );
        
        displayProducts(filtered);
    });

    // 4. INITIALIZE
    displayProducts(products);
</script>

</body>
</html>
